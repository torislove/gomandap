name: gomandap_admin
description: "GoMandap Admin Panel Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Import Shared Library Package
  gomandap_common:
    path: ../../packages/common

  # Navigation
  go_router: ^17.2.3

  # State Management & DI
  flutter_riverpod: ^3.3.2-dev.2
  riverpod_annotation: ^4.0.3-dev.2

  # UI, Icons & Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  supabase_flutter: ^2.8.4
  rxdart: ^0.27.7
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
