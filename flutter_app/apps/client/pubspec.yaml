name: gomandap
description: "GoMandap Client Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Import Shared Library Package
  gomandap_common:
    path: ../../packages/common

  # Navigation
  go_router: ^17.2.3

  # State Management & DI
  flutter_riverpod: ^3.3.2-dev.2
  riverpod_annotation: ^4.0.3-dev.2

  # UI, Icons & Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  flutter_hooks: ^0.21.3+1
  smooth_page_indicator: ^2.0.1

  # Geolocation & Mapping Packages
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  intl: ^0.20.0
  shimmer: ^3.0.0
  google_maps_flutter: ^2.17.1
  flutter_stripe: ^12.6.0
  firebase_messaging: ^16.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  package_info_plus: ^10.1.0
