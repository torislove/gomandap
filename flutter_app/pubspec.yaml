name: gomandap
description: "GoMandap client panel application built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.2.3

  # State Management & DI
  flutter_riverpod: ^3.3.2-dev.2
  riverpod_annotation: ^4.0.3-dev.2

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.2
  path: ^1.9.0

  # UI, Icons & Animations
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1

  # Utilities
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  riverpod_generator: ^4.0.4-dev.3
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets configuration
  assets:
    - assets/images/
