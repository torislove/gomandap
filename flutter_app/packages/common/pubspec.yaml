name: gomandap_common
description: "Shared core library for GoMandap apps"
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase Integration
  supabase_flutter: ^2.5.0

  # HTTP + Cloudflare R2 (AWS SigV4)
  http: ^1.2.1
  crypto: ^3.0.3

  # State Management & DI
  flutter_riverpod: ^3.3.2-dev.2
  riverpod_annotation: ^4.0.3-dev.2

  # Local DB Cache
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.0

  # Shared UI & Fonts
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Utils
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1
  hive: ^2.2.3
  firebase_messaging: ^16.2.2
  supabase: ^2.10.6

dev_dependencies:
  build_runner: ^2.4.9
  riverpod_generator: ^4.0.4-dev.3
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  flutter_lints: ^6.0.0
