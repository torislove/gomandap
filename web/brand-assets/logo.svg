<?xml version="1.0" encoding="UTF-8"?>
<!--
  GoMandap Brand Logo - GoMandap Icon (Web SVG)
  Design: Stylized "G" — 4 pillars with dome forming the letter "G"
  Color: Champagne Gold (#DFBA73) strokes on transparent background
  ViewBox: 48x48, Stroke width: 2.5px
  Source: Same design as Android VectorDrawable (ic_gomandap_logo.xml)
  
  The logo depicts a traditional Indian mandap (wedding canopy) structure
  with 4 pillars and dome arches that together form the letter "G".
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 48 48"
     width="48"
     height="48"
     fill="none"
     stroke="#DFBA73"
     stroke-width="2.5"
     stroke-linecap="round"
     stroke-linejoin="round">
  <!-- Outer circular arc of "G" (dome) -->
  <path d="M35 16.5 A14 14 0 1 0 35 24" />
  <!-- Horizontal crossbar of "G" (mandap beam) -->
  <line x1="24" y1="24" x2="35" y2="24" />
  <!-- Vertical right stroke of "G" (right pillar) -->
  <line x1="35" y1="24" x2="35" y2="31.5" />
  <!-- Inner structural pillars (mandap columns) -->
  <line x1="17" y1="19" x2="17" y2="36" />
  <line x1="22" y1="16" x2="22" y2="36" />
  <line x1="28" y1="16" x2="28" y2="36" />
  <line x1="33" y1="19" x2="33" y2="36" />
  <!-- Dome arches connecting pillar tops -->
  <path d="M17 19 Q19.5 13 22 16" />
  <path d="M22 16 Q25 11 28 16" />
  <path d="M28 16 Q30.5 13 33 19" />
  <!-- Base platform -->
  <line x1="14" y1="36" x2="36" y2="36" />
</svg>
